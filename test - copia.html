<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LoL Draft HUD - Broadcast Replica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');

        :root {
            --blue: #00f2ff;
            --red: #ff4d00;
            --bg-black: #000;
            --glow-blue: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .broadcast-container {
            width: 100%;
            max-width: 1350px;
            position: relative;
        }

        /* BARRA SUPERIOR CON FONDO DE IMAGEN */
        .top-section {
            display: flex;
            justify-content: space-between;
            height: 80px;
            background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Sylas_0.jpg') center no-repeat;
            background-size: cover;
            position: relative;
            border-bottom: 2px solid #222;
        }

        .top-section::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); /* Oscurecer el fondo */
        }

        .side-info {
            position: relative;
            z-index: 2;
            padding: 10px 20px;
            width: 250px;
        }

        .coach-title { font-size: 14px; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        
        /* Contenedor de Bans bajo el coach */
        .bans-row { display: flex; gap: 4px; }
        .ban-box {
            width: 32px;
            height: 32px;
            border: 1px solid #444;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .ban-box img { width: 100%; height: 100%; filter: grayscale(1); opacity: 0.6; }
        .ban-box::after {
            content: ""; position: absolute; top: 50%; left: -10%; width: 120%; height: 1px;
            background: var(--red); transform: rotate(-45deg);
        }

        .series-info-center {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        .series-text { font-size: 11px; letter-spacing: 2px; color: #ccc; text-transform: uppercase; }

        /* CUERPO DEL DRAFT */
        .draft-body {
            display: grid;
            grid-template-columns: repeat(5, 1fr) 200px repeat(5, 1fr);
            height: 340px;
            border-bottom: 4px solid var(--blue);
            box-shadow: var(--glow-blue);
        }

        .player-slot {
            position: relative;
            background: #000;
            border-right: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .slot-blue { border-top: 4px solid var(--blue); }
        .slot-red { border-top: 4px solid var(--red); }

        .champ-bg {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        /* Nombres Verticales pegados abajo */
        .name-tag {
            position: absolute;
            bottom: 45px;
            left: 10px;
            transform: rotate(-90deg);
            transform-origin: left bottom;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 5;
            color: #fff;
        }

        .role-icon-small {
            position: absolute;
            bottom: 8px;
            width: 18px;
            filter: invert(1) opacity(0.7);
        }
        .slot-blue .role-icon-small { right: 8px; }
        .slot-red .role-icon-small { left: 8px; }

        /* SCOREBOARD CENTRAL REPLICADO */
        .scoreboard-center {
            background: linear-gradient(180deg, #0a1c1e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 4px solid #fff;
        }

        .teams-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
        }

        .team-unit { display: flex; flex-direction: column; align-items: center; }
        .win-indicators { display: flex; gap: 3px; margin-bottom: 5px; }
        .win-dot { width: 12px; height: 6px; background: #333; border: 1px solid #555; }
        .win-dot.active { background: #fff; }

        .team-logo { width: 45px; height: 45px; object-fit: contain; }
        .league-logo { width: 30px; opacity: 0.8; }
        
        .team-label { font-size: 22px; font-weight: 700; margin-top: 5px; }
        .patch-label { font-size: 10px; color: #666; letter-spacing: 2px; }

    </style>
</head>
<body>
