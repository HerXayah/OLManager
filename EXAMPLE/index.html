<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador LoL Minimap</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <div class="scoreboard" id="scoreboard"></div>
      </section>

      <section class="map-section">
        <canvas id="mapCanvas" width="1024" height="1024" aria-label="Minimapa del simulador"></canvas>
      </section>

      <aside class="events">
        <h2>Eventos</h2>
        <ul id="eventsList"></ul>
      </aside>
    </main>

    <script src="./simulator.js"></script>
  </body>
</html>
